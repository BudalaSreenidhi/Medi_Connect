<form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Username</label>
    <input type="text" formControlName="username" />
  </div>
  <div>
    <label>Password</label>
    <input type="password" formControlName="password" />
  </div>
  <div>
    <label>Role</label>
    <select formControlName="role" (change)="onRoleChange($event)">
      <option value="">Select</option>
      <option value="DOCTOR">DOCTOR</option>
      <option value="PATIENT">PATIENT</option>
    </select>
  </div>
  <div>
    <label>Full Name</label>
    <input type="text" formControlName="fullName" />
  </div>
  <div>
    <label>Contact Number</label>
    <input type="text" formControlName="contactNumber" />
  </div>
  <div>
    <label>Email</label>
    <input type="email" formControlName="email" />
  </div>

  <div *ngIf="registrationForm.get('role')?.value === 'DOCTOR'">
    <div>
      <label>Specialty</label>
      <input type="text" formControlName="specialty" />
    </div>
    <div>
      <label>Years Of Experience</label>
      <input type="number" formControlName="yearsOfExperience" />
    </div>
  </div>

  <div *ngIf="registrationForm.get('role')?.value === 'PATIENT'">
    <div>
      <label>Date Of Birth</label>
      <input type="date" formControlName="dateOfBirth" />
    </div>
    <div>
      <label>Address</label>
      <input type="text" formControlName="address" />
    </div>
  </div>

  <button type="submit">Register</button>
</form>
<div *ngIf="errorMessage">{{ errorMessage }}</div>
<div *ngIf="successMessage">{{ successMessage }}</div>
